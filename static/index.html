<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralFlow — Visual AI Pipeline Builder</title>
    <meta name="description"
        content="NeuralFlow: A visual AI pipeline builder for code analysis with self-correcting LLM evaluation">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ── Reset & Variables ────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #faf7f2;
            --bg-panel: #ffffff;
            --bg-input: #f5f1eb;
            --bg-card: #fef9f4;
            --coral: #d94f2a;
            --coral-light: #f4a58e;
            --coral-dark: #b83d1e;
            --text: #2c2420;
            --text-muted: #8a7e76;
            --text-light: #b5a99e;
            --border: #e8e2da;
            --border-focus: #d94f2a;
            --green: #2d9e5f;
            --green-bg: #e8f8ee;
            --red: #d94f2a;
            --red-bg: #fef0ec;
            --yellow: #d4a017;
            --yellow-bg: #fef9e7;
            --blue: #3273dc;
            --shadow-sm: 0 1px 3px rgba(44, 36, 32, 0.06);
            --shadow-md: 0 4px 12px rgba(44, 36, 32, 0.08);
            --shadow-lg: 0 8px 24px rgba(44, 36, 32, 0.1);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s ease;
            --font: 'IBM Plex Mono', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Layout ───────────────────────────────────────── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--coral), var(--coral-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(217, 79, 42, 0.3);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--coral);
        }

        .health-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .health-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-light);
            transition: background var(--transition);
        }

        .health-dot.ok {
            background: var(--green);
            box-shadow: 0 0 6px rgba(45, 158, 95, 0.4);
        }

        .health-dot.fail {
            background: var(--red);
            box-shadow: 0 0 6px rgba(217, 79, 42, 0.4);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left Panel ───────────────────────────────────── */
        .left-panel {
            width: 260px;
            min-width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-section {
            padding: 16px;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg-input);
        }

        .upload-area:hover {
            border-color: var(--coral);
            background: var(--red-bg);
        }

        .upload-area.dragging {
            border-color: var(--coral);
            background: var(--red-bg);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 28px;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        .upload-text {
            font-size: 12px;
            color: var(--text-muted);
        }

        .upload-text strong {
            color: var(--coral);
        }

        #fileInput {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-input);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--coral), var(--coral-light));
            border-radius: 2px;
            width: 0%;
            transition: width 0.4s ease;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            border: 1px solid transparent;
            margin-bottom: 4px;
        }

        .file-item:hover {
            background: var(--bg-input);
        }

        .file-item.active {
            background: var(--red-bg);
            border-color: var(--coral-light);
        }

        .file-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .file-item.active .file-icon {
            background: var(--coral);
            color: #fff;
        }

        .file-meta {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-stats {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ── Middle Panel ─────────────────────────────────── */
        .middle-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .query-section {
            padding: 16px 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }

        .query-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .query-input-wrap {
            flex: 1;
        }

        .query-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        textarea#queryInput {
            width: 100%;
            height: 72px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            font-family: var(--font);
            font-size: 13px;
            color: var(--text);
            resize: vertical;
            transition: border-color var(--transition);
            outline: none;
        }

        textarea#queryInput:focus {
            border-color: var(--coral);
        }

        .run-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--coral), var(--coral-dark));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(217, 79, 42, 0.3);
        }

        .run-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(217, 79, 42, 0.4);
        }

        .run-btn:active {
            transform: translateY(0);
        }

        .run-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Results Area ─────────────────────────────────── */
        .results-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .score-badge.pass {
            background: var(--green-bg);
            color: var(--green);
        }

        .score-badge.fail {
            background: var(--red-bg);
            color: var(--red);
        }

        .score-badge.warn {
            background: var(--yellow-bg);
            color: var(--yellow);
        }

        .stat-chip {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-muted);
            font-weight: 500;
        }

        .json-output {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 16px;
            border-radius: var(--radius);
            font-size: 12px;
            line-height: 1.7;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            box-shadow: var(--shadow-md);
            max-height: 400px;
            overflow-y: auto;
        }

        .json-output .json-key {
            color: #89b4fa;
        }

        .json-output .json-string {
            color: #a6e3a1;
        }

        .json-output .json-number {
            color: #fab387;
        }

        .json-output .json-bool {
            color: #cba6f7;
        }

        .json-output .json-null {
            color: #f38ba8;
        }

        .console-section {
            margin-top: 16px;
        }

        .console-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .console-log {
            background: #1e1e2e;
            color: #a6adc8;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 11px;
            line-height: 1.8;
            max-height: 200px;
            overflow-y: auto;
        }

        .console-line {
            padding: 2px 0;
            border-bottom: 1px solid rgba(166, 173, 200, 0.05);
        }

        .console-line::before {
            content: '›';
            color: var(--coral-light);
            margin-right: 8px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-light);
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .empty-state-sub {
            font-size: 12px;
        }

        /* ── Right Panel ──────────────────────────────────── */
        .right-panel {
            width: 280px;
            min-width: 280px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all var(--transition);
        }

        .tab-btn:hover {
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--coral);
            border-bottom-color: var(--coral);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        .rule-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 10px;
            transition: all var(--transition);
        }

        .rule-card:hover {
            border-color: var(--coral-light);
            box-shadow: var(--shadow-sm);
        }

        .rule-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .rule-type-badge {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .rule-type-badge.equality {
            background: #e0ecff;
            color: #3273dc;
        }

        .rule-type-badge.range {
            background: #fff3cd;
            color: #856404;
        }

        .rule-type-badge.presence {
            background: var(--green-bg);
            color: var(--green);
        }

        .rule-type-badge.conditional {
            background: #f0e0ff;
            color: #7c3aed;
        }

        .rule-type-badge.enum {
            background: #ffe0e6;
            color: #c2185b;
        }

        .rule-severity {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: auto;
        }

        .rule-severity.error {
            color: var(--red);
        }

        .rule-severity.warning {
            color: var(--yellow);
        }

        .rule-desc {
            font-size: 12px;
            color: var(--text);
            line-height: 1.5;
        }

        .rule-field {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid var(--border);
        }

        .correction-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 10px;
        }

        .correction-query {
            font-size: 11px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .correction-errors {
            font-size: 11px;
            color: var(--red);
            margin-bottom: 6px;
            background: var(--red-bg);
            padding: 6px 10px;
            border-radius: 4px;
        }

        .correction-fix {
            font-size: 11px;
            color: var(--green);
            background: var(--green-bg);
            padding: 6px 10px;
            border-radius: 4px;
        }

        .correction-time {
            font-size: 10px;
            color: var(--text-light);
            margin-top: 6px;
        }

        .empty-tab {
            text-align: center;
            color: var(--text-light);
            padding: 32px 16px;
            font-size: 12px;
        }

        /* ── Toast ─────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 12px;
            font-weight: 500;
            color: #fff;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--green);
        }

        .toast.error {
            background: var(--red);
        }

        .toast.info {
            background: var(--blue);
        }

        /* ── Animations ────────────────────────────────────── */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .loading-dot {
            display: inline-block;
            animation: pulse 1.4s infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ── Typewriter Cursor ─────────────────────────────── */
        @keyframes blink-caret {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: var(--coral-light);
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: blink-caret 0.7s step-end infinite;
        }

        .console-line.typing-in {
            animation: fadeSlideIn 0.25s ease-out both;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Console Tab ───────────────────────────────────── */
        .console-tab-body {
            display: flex;
            flex-direction: column;
            height: 100%;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
        }

        .console-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .console-header .console-dot {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
        }

        .console-header .console-label {
            font-weight: 600;
            font-size: 11px;
            color: var(--text);
            flex: 1;
        }

        .console-header button {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 8px;
            font-family: var(--font);
            font-size: 9px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .console-header button:hover {
            background: var(--bg-input);
            color: var(--text);
        }

        .console-header button.active {
            background: var(--coral);
            color: #fff;
            border-color: var(--coral);
        }

        .console-lines {
            flex: 1;
            overflow-y: auto;
            padding: 6px 10px;
            position: relative;
        }

        .clog-line {
            display: flex;
            gap: 6px;
            padding: 3px 0;
            line-height: 1.5;
            animation: fadeSlideIn 0.25s ease-out both;
        }

        .clog-time {
            color: #b8b0a6;
            flex-shrink: 0;
            font-size: 9px;
            min-width: 52px;
        }

        .clog-icon {
            flex-shrink: 0;
            width: 12px;
            text-align: center;
        }

        .clog-msg {
            flex: 1;
            word-break: break-word;
        }

        .clog-line[data-type="info"] .clog-icon {
            color: #8c857c;
        }

        .clog-line[data-type="ok"] .clog-icon {
            color: #3a7a52;
        }

        .clog-line[data-type="ok"] .clog-msg {
            color: #3a7a52;
        }

        .clog-line[data-type="warn"] .clog-icon {
            color: #b07d16;
        }

        .clog-line[data-type="warn"] .clog-msg {
            color: #b07d16;
        }

        .clog-line[data-type="error"] .clog-icon {
            color: #c0420f;
        }

        .clog-line[data-type="error"] .clog-msg {
            color: #c0420f;
        }

        .clog-line[data-type="data"] .clog-icon {
            color: #2457a4;
        }

        .clog-line[data-type="data"] .clog-msg {
            color: #2457a4;
        }

        .clog-line[data-type="progress"] .clog-icon {
            color: #d94f2a;
        }

        .clog-line[data-type="progress"] .clog-msg {
            color: #d94f2a;
            font-weight: 500;
        }

        .clog-progress {
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding-left: 70px;
        }

        .clog-progress-track {
            flex: 1;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .clog-progress-fill {
            height: 100%;
            background: var(--coral);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .clog-progress-pct {
            font-size: 9px;
            color: var(--text-muted);
            min-width: 28px;
            text-align: right;
        }

        .tab-btn {
            position: relative;
        }

        .console-badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background: #c0420f;
            color: #fff;
            font-size: 9px;
            border-radius: 10px;
            padding: 1px 5px;
            line-height: 1.2;
            min-width: 14px;
            text-align: center;
        }

        .console-newlogs {
            position: sticky;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--coral);
            color: #fff;
            font-size: 9px;
            font-family: var(--font);
            border-radius: 12px;
            padding: 4px 12px;
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 5;
        }

        .console-newlogs:hover {
            background: var(--coral-dark);
        }

        /* ── Scrollbar ─────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- ── Header ──────────────────────────────────────── -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">N</div>
                <div class="logo-text">Neural<span>Flow</span></div>
            </div>
            <div class="health-badge">
                <span>MySQL</span>
                <div id="healthMysql" class="health-dot"></div>
                <span>Ollama</span>
                <div id="healthOllama" class="health-dot"></div>
            </div>
        </header>

        <div class="main-content">
            <!-- ── Left Panel ──────────────────────────────────── -->
            <aside class="left-panel">
                <div class="panel-section">
                    <div class="panel-title">Upload File</div>
                    <div id="uploadArea" class="upload-area">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">
                            <strong>Click</strong> or drag a file<br>
                            .php .json .txt .csv .go .js .py
                        </div>
                        <input type="file" id="fileInput" accept=".php,.json,.txt,.csv,.go,.js,.py">
                    </div>
                    <div id="progressBar" class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
                <div class="panel-section" style="padding-top: 0;">
                    <div class="panel-title">Files</div>
                </div>
                <div id="fileList" class="file-list"></div>
            </aside>

            <!-- ── Middle Panel ────────────────────────────────── -->
            <main class="middle-panel">
                <div class="query-section">
                    <div class="query-row">
                        <div class="query-input-wrap">
                            <div class="query-label">Query <span id="activeFileLabel"
                                    style="color:var(--coral);"></span></div>
                            <textarea id="queryInput" placeholder="e.g., student with 3 appearing papers"></textarea>
                        </div>
                        <button id="runBtn" class="run-btn" disabled>Run ▸</button>
                    </div>
                </div>
                <div id="resultsArea" class="results-area">
                    <div class="empty-state">
                        <div class="empty-state-icon">⚡</div>
                        <div class="empty-state-text">No results yet</div>
                        <div class="empty-state-sub">Upload a file and run a query to see results</div>
                    </div>
                </div>
            </main>

            <!-- ── Right Panel ─────────────────────────────────── -->
            <aside class="right-panel">
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="rules">Rules</button>
                    <button class="tab-btn" data-tab="corrections">Corrections</button>
                    <button class="tab-btn" data-tab="console" id="consoleTabBtn">Console</button>
                </div>
                <div class="tab-content">
                    <div id="rulesTab" class="tab-pane active">
                        <div class="empty-tab">Select a file to view rules</div>
                    </div>
                    <div id="correctionsTab" class="tab-pane">
                        <div class="empty-tab">Select a file to view corrections</div>
                    </div>
                    <div id="consoleTab" class="tab-pane">
                        <div class="console-tab-body">
                            <div class="console-header">
                                <div class="console-dot" id="consoleDot"></div>
                                <span class="console-label">Console</span>
                                <button id="consoleClearBtn">Clear</button>
                                <button id="consoleScrollBtn" class="active" title="Auto-scroll">↓</button>
                            </div>
                            <div class="console-lines" id="consoleLines"></div>
                            <button class="console-newlogs" id="consoleNewLogsBtn">↓ New logs</button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- ── Toast Container ──────────────────────────────── -->
    <div id="toast" class="toast"></div>

    <script>
        // ─── State ──────────────────────────────────────────────
        const state = {
            activeFile: null,
            files: [],
            isRunning: false,
            isUploading: false,
        };

        // ─── DOM References ─────────────────────────────────────
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const dom = {
            uploadArea: $('#uploadArea'),
            fileInput: $('#fileInput'),
            progressBar: $('#progressBar'),
            progressFill: $('#progressFill'),
            fileList: $('#fileList'),
            queryInput: $('#queryInput'),
            activeFileLabel: $('#activeFileLabel'),
            runBtn: $('#runBtn'),
            resultsArea: $('#resultsArea'),
            rulesTab: $('#rulesTab'),
            correctionsTab: $('#correctionsTab'),
            toast: $('#toast'),
            healthMysql: $('#healthMysql'),
            healthOllama: $('#healthOllama'),
        };

        // ─── API Helpers ────────────────────────────────────────
        async function apiGet(url) {
            const res = await fetch(url);
            return res.json();
        }

        async function apiPost(url, body) {
            const res = await fetch(url, {
                method: 'POST',
                headers: body instanceof FormData ? {} : { 'Content-Type': 'application/json' },
                body: body instanceof FormData ? body : JSON.stringify(body),
            });
            return res.json();
        }

        function showToast(msg, type = 'info') {
            dom.toast.textContent = msg;
            dom.toast.className = `toast ${type} show`;
            setTimeout(() => dom.toast.classList.remove('show'), 3500);
        }

        // ─── Health Check ───────────────────────────────────────
        async function checkHealth() {
            try {
                const res = await apiGet('/health');
                const d = res.data || {};
                dom.healthMysql.className = 'health-dot ' + (d.mysql ? 'ok' : 'fail');
                dom.healthOllama.className = 'health-dot ' + (d.ollama ? 'ok' : 'fail');
            } catch {
                dom.healthMysql.className = 'health-dot fail';
                dom.healthOllama.className = 'health-dot fail';
            }
        }

        // ─── File Upload ────────────────────────────────────────
        dom.uploadArea.addEventListener('click', () => dom.fileInput.click());

        dom.uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dom.uploadArea.classList.add('dragging');
        });

        dom.uploadArea.addEventListener('dragleave', () => {
            dom.uploadArea.classList.remove('dragging');
        });

        dom.uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dom.uploadArea.classList.remove('dragging');
            if (e.dataTransfer.files.length > 0) uploadFile(e.dataTransfer.files[0]);
        });

        dom.fileInput.addEventListener('change', () => {
            if (dom.fileInput.files.length > 0) uploadFile(dom.fileInput.files[0]);
        });

        async function uploadFile(file) {
            if (state.isUploading) return;
            state.isUploading = true;

            dom.progressBar.classList.add('active');
            dom.progressFill.style.width = '10%';

            const fd = new FormData();
            fd.append('file', file);

            try {
                dom.progressFill.style.width = '30%';
                showToast(`Uploading ${file.name}...`, 'info');

                dom.progressFill.style.width = '50%';
                const res = await apiPost('/api/upload', fd);

                if (res.error) {
                    showToast(`Upload failed: ${res.error}`, 'error');
                    return;
                }

                dom.progressFill.style.width = '100%';
                const d = res.data;
                showToast(`Uploaded ${d.filename}: ${d.chunks} chunks, ${d.rules} rules`, 'success');

                await loadFiles();
                selectFile(d.filename);
            } catch (err) {
                showToast(`Upload error: ${err.message}`, 'error');
            } finally {
                state.isUploading = false;
                setTimeout(() => {
                    dom.progressBar.classList.remove('active');
                    dom.progressFill.style.width = '0%';
                }, 800);
            }
        }

        // ─── File List ──────────────────────────────────────────
        async function loadFiles() {
            try {
                const res = await apiGet('/api/files');
                state.files = res.data || [];
                renderFileList();
            } catch (err) {
                console.error('Failed to load files:', err);
            }
        }

        function renderFileList() {
            if (state.files.length === 0) {
                dom.fileList.innerHTML = '<div class="empty-tab">No files uploaded yet</div>';
                return;
            }

            dom.fileList.innerHTML = state.files.map(f => {
                const isActive = state.activeFile === f.filename;
                const ext = f.filename.split('.').pop().toUpperCase();
                return `
        <div class="file-item ${isActive ? 'active' : ''}" data-filename="${f.filename}">
          <div class="file-icon">${ext}</div>
          <div class="file-meta">
            <div class="file-name">${f.filename}</div>
            <div class="file-stats">${f.chunk_count} chunks · ${f.rule_count} rules</div>
          </div>
        </div>
      `;
            }).join('');

            // Add click handlers.
            dom.fileList.querySelectorAll('.file-item').forEach(el => {
                el.addEventListener('click', () => selectFile(el.dataset.filename));
            });
        }

        function selectFile(filename) {
            state.activeFile = filename;
            dom.activeFileLabel.textContent = filename ? `→ ${filename}` : '';
            dom.runBtn.disabled = !filename;
            renderFileList();
            loadRules(filename);
            loadCorrections(filename);
        }

        // ─── Rules ──────────────────────────────────────────────
        async function loadRules(filename) {
            if (!filename) {
                dom.rulesTab.innerHTML = '<div class="empty-tab">Select a file to view rules</div>';
                return;
            }

            try {
                const res = await apiGet(`/api/rules?filename=${encodeURIComponent(filename)}`);
                const rules = res.data || [];

                if (rules.length === 0) {
                    dom.rulesTab.innerHTML = '<div class="empty-tab">No rules found for this file</div>';
                    return;
                }

                dom.rulesTab.innerHTML = rules.map(r => `
        <div class="rule-card">
          <div class="rule-header">
            <span class="rule-type-badge ${r.type || ''}">${escapeHtml(r.type || 'unknown')}</span>
            <span class="rule-severity ${r.severity || ''}">${escapeHtml(r.severity || '')}</span>
          </div>
          <div class="rule-desc">${escapeHtml(r.description || '')}</div>
          <div class="rule-field">
            <strong>${escapeHtml(r.field || '')}</strong>
            ${r.operator ? ` (${escapeHtml(r.operator)})` : ''}
          </div>
        </div>
      `).join('');
            } catch {
                dom.rulesTab.innerHTML = '<div class="empty-tab">Failed to load rules</div>';
            }
        }

        // ─── Corrections ────────────────────────────────────────
        async function loadCorrections(filename) {
            if (!filename) {
                dom.correctionsTab.innerHTML = '<div class="empty-tab">Select a file to view corrections</div>';
                return;
            }

            try {
                const res = await apiGet(`/api/corrections?filename=${encodeURIComponent(filename)}`);
                const corrections = res.data || [];

                if (corrections.length === 0) {
                    dom.correctionsTab.innerHTML = '<div class="empty-tab">No corrections yet</div>';
                    return;
                }

                dom.correctionsTab.innerHTML = corrections.map(c => `
        <div class="correction-card">
          <div class="correction-query">Q: ${escapeHtml(c.query || '')}</div>
          ${c.errors ? `<div class="correction-errors">${escapeHtml(c.errors)}</div>` : ''}
          ${c.correction ? `<div class="correction-fix">${escapeHtml(c.correction)}</div>` : ''}
          <div class="correction-time">${c.created_at || ''}</div>
        </div>
      `).join('');
            } catch {
                dom.correctionsTab.innerHTML = '<div class="empty-tab">Failed to load corrections</div>';
            }
        }

        // ─── Run Pipeline ───────────────────────────────────────
        dom.runBtn.addEventListener('click', runPipeline);

        dom.queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                runPipeline();
            }
        });

        async function runPipeline() {
            if (state.isRunning || !state.activeFile) return;
            const query = dom.queryInput.value.trim();
            if (!query) {
                showToast('Enter a query first', 'error');
                return;
            }

            state.isRunning = true;
            dom.runBtn.disabled = true;
            dom.runBtn.innerHTML = '<span class="spinner"></span> Running...';

            // Build the SSE-ready result shell.
            dom.resultsArea.innerHTML = `
      <div id="resultHeaderEl" class="result-header" style="display:none;"></div>
      <div id="jsonOutputEl" class="json-output"><span class="typewriter-cursor"></span></div>
      <div id="errorsEl"></div>
      <div class="console-section">
        <div class="console-title">Pipeline Log</div>
        <div id="consoleLogEl" class="console-log"></div>
      </div>
    `;

            const jsonEl = document.getElementById('jsonOutputEl');
            const consoleEl = document.getElementById('consoleLogEl');
            const headerEl = document.getElementById('resultHeaderEl');
            const errorsEl = document.getElementById('errorsEl');

            // Track accumulated tokens for syntax highlighting.
            let tokenBuffer = '';
            let highlightTimer = null;

            // Debounced syntax highlight — re-highlight every 50ms during streaming.
            function scheduleHighlight() {
                if (highlightTimer) return;
                highlightTimer = setTimeout(() => {
                    highlightTimer = null;
                    jsonEl.innerHTML = syntaxHighlight(tokenBuffer)
                        + '<span class="typewriter-cursor"></span>';
                    jsonEl.scrollTop = jsonEl.scrollHeight;
                }, 50);
            }

            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: state.activeFile, query }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let sseBuffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    sseBuffer += decoder.decode(value, { stream: true });

                    // Parse SSE events from the buffer.
                    const lines = sseBuffer.split('\n');
                    sseBuffer = lines.pop(); // Keep incomplete line in buffer.

                    let currentEvent = null;
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            currentEvent = line.slice(7).trim();
                        } else if (line.startsWith('data: ') && currentEvent) {
                            const rawData = line.slice(6);
                            try {
                                const data = JSON.parse(rawData);
                                handleSSEEvent(currentEvent, data);
                            } catch { /* ignore parse errors */ }
                            currentEvent = null;
                        } else if (line === '') {
                            currentEvent = null;
                        }
                    }
                }
            } catch (err) {
                dom.resultsArea.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">💥</div>
          <div class="empty-state-text">Connection Failed</div>
          <div class="empty-state-sub">${escapeHtml(err.message)}</div>
        </div>
      `;
                showToast(`Error: ${err.message}`, 'error');
            } finally {
                state.isRunning = false;
                dom.runBtn.disabled = false;
                dom.runBtn.innerHTML = 'Run ▸';
                // Remove blinking cursor when done.
                const cursor = jsonEl?.querySelector('.typewriter-cursor');
                if (cursor) cursor.remove();
            }

            function handleSSEEvent(event, data) {
                switch (event) {
                    case 'log': {
                        const lineEl = document.createElement('div');
                        lineEl.className = 'console-line typing-in';
                        lineEl.textContent = data;
                        consoleEl.appendChild(lineEl);
                        consoleEl.scrollTop = consoleEl.scrollHeight;
                        break;
                    }

                    case 'token': {
                        tokenBuffer += data;
                        scheduleHighlight();
                        break;
                    }

                    case 'result': {
                        // Final result — render score badge and errors.
                        const scorePercent = (data.score * 100).toFixed(1);
                        const scoreClass = data.passed ? 'pass' : (data.score >= 0.5 ? 'warn' : 'fail');
                        const statusIcon = data.passed ? '✓' : '✗';

                        headerEl.style.display = 'flex';
                        headerEl.innerHTML = `
              <div class="score-badge ${scoreClass}">
                ${statusIcon} Score: ${scorePercent}%
              </div>
              <div class="stat-chip">Retries: ${data.retries}</div>
              <div class="stat-chip">Run #${data.run_id}</div>
              <div class="stat-chip">${data.passed ? '✓ Passed' : '✗ Failed'}</div>
            `;

                        // Render errors.
                        if (data.errors && data.errors.length > 0) {
                            errorsEl.innerHTML = `
                <div style="margin: 12px 0;">
                  <div class="console-title">Evaluation Errors</div>
                  ${data.errors.map(e => `<div style="font-size:11px; color:var(--red); padding:3px 0;">• ${escapeHtml(e)}</div>`).join('')}
                </div>
              `;
                        }

                        // Final syntax highlight of the complete output.
                        const finalJson = typeof data.output === 'string'
                            ? data.output
                            : JSON.stringify(data.output, null, 2);
                        jsonEl.innerHTML = syntaxHighlight(finalJson);

                        showToast(
                            `Score: ${(data.score * 100).toFixed(0)}% — ${data.passed ? 'Passed' : 'Failed'}`,
                            data.passed ? 'success' : 'error'
                        );

                        // Reload corrections after a run.
                        loadCorrections(state.activeFile);
                        break;
                    }

                    case 'error': {
                        showToast(`Pipeline error: ${data}`, 'error');
                        break;
                    }

                    case 'done':
                        break;
                }
            }
        }

        // ─── Tabs ───────────────────────────────────────────────
        $$('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                $$('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                $$('.tab-pane').forEach(p => p.classList.remove('active'));
                $(`#${btn.dataset.tab}Tab`).classList.add('active');

                // Reset console unread badge when switching to Console tab.
                if (btn.dataset.tab === 'console') {
                    consoleUnread = 0;
                    updateConsoleBadge();
                }
            });
        });

        // ─── Console SSE ─────────────────────────────────────────
        const consoleEl = $('#consoleLines');
        const consoleDot = $('#consoleDot');
        const consoleScrollBtn = $('#consoleScrollBtn');
        const consoleNewLogsBtn = $('#consoleNewLogsBtn');
        const consoleTabBtn = $('#consoleTabBtn');

        let consoleAutoScroll = true;
        let consoleUnread = 0;
        let consoleLineCount = 0;
        const CONSOLE_MAX_LINES = 500;

        const LOG_ICONS = {
            info: '→',
            ok: '✓',
            warn: '⚠',
            error: '✕',
            data: '✦',
            progress: '◈',
        };

        // ── Autoscroll toggle ──
        consoleScrollBtn.addEventListener('click', () => {
            consoleAutoScroll = !consoleAutoScroll;
            consoleScrollBtn.classList.toggle('active', consoleAutoScroll);
            if (consoleAutoScroll) {
                consoleEl.scrollTop = consoleEl.scrollHeight;
                consoleNewLogsBtn.style.display = 'none';
            }
        });

        // Detect manual scroll-up → disable autoscroll.
        consoleEl.addEventListener('scroll', () => {
            const atBottom = consoleEl.scrollHeight - consoleEl.scrollTop - consoleEl.clientHeight < 30;
            if (!atBottom && consoleAutoScroll) {
                consoleAutoScroll = false;
                consoleScrollBtn.classList.remove('active');
            }
            if (atBottom) {
                consoleNewLogsBtn.style.display = 'none';
            }
        });

        // ── New logs sticky button ──
        consoleNewLogsBtn.addEventListener('click', () => {
            consoleAutoScroll = true;
            consoleScrollBtn.classList.add('active');
            consoleEl.scrollTop = consoleEl.scrollHeight;
            consoleNewLogsBtn.style.display = 'none';
        });

        // ── Clear button ──
        $('#consoleClearBtn').addEventListener('click', () => {
            consoleEl.innerHTML = '';
            consoleLineCount = 0;
        });

        // ── Unread badge ──
        function updateConsoleBadge() {
            let badge = consoleTabBtn.querySelector('.console-badge');
            if (consoleUnread > 0) {
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'console-badge';
                    consoleTabBtn.appendChild(badge);
                }
                badge.textContent = consoleUnread > 99 ? '99+' : consoleUnread;
            } else if (badge) {
                badge.remove();
            }
        }

        function isConsoleActive() {
            return consoleTabBtn.classList.contains('active');
        }

        // ── Append a log line ──
        function appendLogLine(entry) {
            const type = entry.type || 'info';
            const icon = LOG_ICONS[type] || '→';
            const time = entry.time || '';
            const msg = entry.message || '';

            const lineEl = document.createElement('div');
            lineEl.className = 'clog-line';
            lineEl.setAttribute('data-type', type);
            lineEl.innerHTML = `
                <span class="clog-time">${escapeHtml(time)}</span>
                <span class="clog-icon">${icon}</span>
                <span class="clog-msg">${escapeHtml(msg)}</span>
            `;
            consoleEl.appendChild(lineEl);

            // Progress bar for progress events.
            if (type === 'progress' && entry.meta && entry.meta.total > 0) {
                const pct = Math.round((entry.meta.current / entry.meta.total) * 100);
                const progEl = document.createElement('div');
                progEl.className = 'clog-progress';
                progEl.innerHTML = `
                    <div class="clog-progress-track">
                        <div class="clog-progress-fill" style="width:${pct}%"></div>
                    </div>
                    <span class="clog-progress-pct">${pct}%</span>
                `;
                consoleEl.appendChild(progEl);
            }

            consoleLineCount++;

            // Prune old lines.
            while (consoleLineCount > CONSOLE_MAX_LINES) {
                const first = consoleEl.firstElementChild;
                if (first) {
                    // If next sibling is a progress bar, remove that too.
                    if (first.nextElementSibling && first.nextElementSibling.classList.contains('clog-progress')) {
                        first.nextElementSibling.remove();
                    }
                    first.remove();
                    consoleLineCount--;
                } else break;
            }

            // Autoscroll.
            if (consoleAutoScroll) {
                consoleEl.scrollTop = consoleEl.scrollHeight;
            } else {
                consoleNewLogsBtn.style.display = 'block';
            }

            // Unread badge.
            if (!isConsoleActive()) {
                consoleUnread++;
                updateConsoleBadge();
            }
        }

        // ── SSE Connection ──
        let sseRetries = 0;
        const SSE_MAX_RETRIES = 5;

        function connectLogSSE() {
            const evtSource = new EventSource('/api/logs');

            evtSource.onopen = () => {
                sseRetries = 0;
                consoleDot.style.background = 'var(--green)';
                appendLogLine({ time: new Date().toLocaleTimeString('en-GB', { hour12: false }).slice(0, 8), type: 'ok', message: 'Connected to server log stream' });
            };

            evtSource.addEventListener('log', (e) => {
                try {
                    const entry = JSON.parse(e.data);
                    appendLogLine(entry);
                } catch { /* ignore */ }
            });

            evtSource.onerror = () => {
                evtSource.close();
                consoleDot.style.background = '#c0420f';
                sseRetries++;

                if (sseRetries <= SSE_MAX_RETRIES) {
                    appendLogLine({ time: new Date().toLocaleTimeString('en-GB', { hour12: false }).slice(0, 8), type: 'error', message: `Log stream disconnected — reconnecting (${sseRetries}/${SSE_MAX_RETRIES})...` });
                    setTimeout(connectLogSSE, 3000);
                } else {
                    appendLogLine({ time: new Date().toLocaleTimeString('en-GB', { hour12: false }).slice(0, 8), type: 'error', message: 'Log stream unavailable' });
                }
            };
        }

        // ─── Utilities ──────────────────────────────────────────
        function escapeHtml(str) {
            const el = document.createElement('div');
            el.textContent = str;
            return el.innerHTML;
        }

        function syntaxHighlight(jsonStr) {
            try {
                // Ensure it's valid JSON and re-format.
                const parsed = JSON.parse(jsonStr);
                jsonStr = JSON.stringify(parsed, null, 2);
            } catch { /* use as-is */ }

            return escapeHtml(jsonStr).replace(
                /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                (match) => {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        cls = /:$/.test(match) ? 'json-key' : 'json-string';
                    } else if (/true|false/.test(match)) {
                        cls = 'json-bool';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return `<span class="${cls}">${match}</span>`;
                }
            );
        }

        // ─── Init ───────────────────────────────────────────────
        (async function init() {
            await checkHealth();
            await loadFiles();
            setInterval(checkHealth, 30000);
            connectLogSSE();
        })();
    </script>
</body>

</html>
